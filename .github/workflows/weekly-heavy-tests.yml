name: Weekly Heavy Test

# Runs tests that are too slow for the daily CI matrix (feature_pruning: 1.5–4 h, 4 GB;
# feature_dbcrash: needs far more than the daily 1800s per-test budget for its
# loosest dbcrashratio/dbcache tier to reliably crash at least once).
# Each test runs in its own job (feature-pruning, feature-dbcrash) so a slow
# run of one doesn't eat into the other's share of the 6h GitHub-hosted-runner
# execution ceiling. Each script is invoked directly (test/functional/<script>.py),
# not via test_runner.py: these scripts are deliberately excluded from
# test_runner.py's ALL_SCRIPTS list (see HEAVY_SCRIPTS there) so they never run
# as part of the daily base/extended suites, but that also means
# test_runner.py can't be given their names positionally -- its lookup only
# matches ALL_SCRIPTS, so passing e.g. "feature_pruning.py" on the command
# line used to silently no-op (WARNING + empty test list + exit 0), making
# this job appear to pass without ever running anything.
# Scheduled weekly; can also be triggered manually or after a successful daily build.
on:
  schedule:
    # Sunday 5 AM JST (Saturday 8 PM UTC)
    - cron: '0 20 * * 0'
  workflow_dispatch:
    inputs:
      test_branch:
        description: 'Branch to test (default: master)'
        type: string
        default: ''
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_FAILFAST_TEST_LEAVE_DANGLING: 1
  CTEST_OUTPUT_ON_FAILURE: 'ON'
  CMAKE_BUILD_PARALLEL_LEVEL: 4
  LC_ALL: C.UTF-8
  BOOST_TEST_RANDOM: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  heavy-tests:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: feature_pruning
            scripts:
              - 'feature_pruning.py'
          - name: feature_dbcrash
            scripts:
              - 'feature_dbcrash.py'
              - 'feature_dbcrash.py --scheme SCHNORR'
    name: ${{ matrix.config.name }} test (Linux x86_64 RelWithDebInfo)
    runs-on: ubuntu-latest
    # No timeout-minutes set: GitHub-hosted runners hard-cap job execution at
    # 6 hours regardless of any value configured here, so anything above that
    # is dead configuration. Each test now runs in its own matrix job (not
    # sharing a job, and without a TIMEOUT-retry from another test eating
    # into the budget), comfortably fitting within that 6h ceiling.
    env:
      BASE_ROOT_DIR: ${{ github.workspace }}
      CCACHE_DIR: ${{ github.workspace }}/ccache
      BASE_BUILD_DIR: ${{ github.workspace }}/build
      DEPENDS_DIR: ${{ github.workspace }}/depends

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.test_branch || github.ref || 'master' }}
          submodules: recursive

      # Share the ccache populated by the daily-test workflow for this exact config.
      - name: Restore Ccache cache
        id: ccache-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: daily-linux-x86_64-RelWithDebInfo-true-true-true-ccache-${{ github.run_id }}
          restore-keys: daily-linux-x86_64-RelWithDebInfo-true-true-true-ccache-

      - name: Restore Depends cache
        id: depends-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.DEPENDS_DIR }}
          key: depends-v6-qt6-linux-x86_64-${{ hashFiles('depends/packages/*', 'depends/hosts/*.mk', 'depends/builders/*.mk', 'depends/funcs.mk', 'depends/toolchain.cmake.in', 'depends/patches/**') }}
          restore-keys: depends-v6-qt6-linux-x86_64-

      - name: Setup Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ ccache build-essential cmake ninja-build meson pkgconf \
            python3-zmq bsdmainutils systemtap-sdt-dev bpfcc-tools bpftrace python3-venv \
            libboost-test-dev
          python3 -m venv $HOME/venv
          source $HOME/venv/bin/activate
          pip3 install pyzmq

      - name: Build Depends
        run: |
          export HOST="x86_64-pc-linux-gnu"
          DEPENDS_PREFIX="$DEPENDS_DIR/$HOST"

          if [ -d "$DEPENDS_PREFIX" ] && [ -f "$DEPENDS_PREFIX/lib/libevent.a" ] && \
             [ -f "$DEPENDS_PREFIX/lib/cmake/Qt6/Qt6Config.cmake" ] && \
             [ -f "$DEPENDS_PREFIX/lib/libdb_cxx-4.8.a" ]; then
            echo "Depends cache hit — skipping rebuild"
          else
            echo "Building depends for $HOST"
            make -C depends HOST=$HOST -j$(nproc) install_cmake
          fi

          echo "DEPENDS_PREFIX=$DEPENDS_PREFIX" >> $GITHUB_ENV

      - name: Enable core dumps and set test dir
        run: |
          CORE_DUMP_DIR="${{ github.workspace }}/core_dumps"
          mkdir -p "$CORE_DUMP_DIR"
          sudo sysctl -w kernel.core_pattern="$CORE_DUMP_DIR/core.%e.%p"
          TEST_DIR="${{ github.workspace }}/tapyrus_test"
          mkdir -p "$TEST_DIR"
          echo "TAPYRUS_TEST_DIR=$TEST_DIR" >> $GITHUB_ENV

      - name: Configure and build
        run: |
          HOST="x86_64-pc-linux-gnu"
          DEPENDS_PREFIX="$DEPENDS_DIR/$HOST"
          export CC="gcc"
          export CXX="g++"
          export PKG_CONFIG_PATH="$DEPENDS_PREFIX/lib/pkgconfig:$PKG_CONFIG_PATH"
          export LD_LIBRARY_PATH="$DEPENDS_PREFIX/lib:$LD_LIBRARY_PATH"
          echo ">" $HOME/.tapyrus

          cmake -S "$BASE_ROOT_DIR" -B "$BASE_BUILD_DIR" -GNinja \
            -DENABLE_ZMQ=ON \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_PREFIX_PATH="$DEPENDS_PREFIX" \
            -DCMAKE_TOOLCHAIN_FILE="$DEPENDS_PREFIX/toolchain.cmake" \
            -DQt6_DIR="$DEPENDS_PREFIX/lib/cmake/Qt6" \
            -DBUILD_GUI=ON \
            -DENABLE_TRACING=ON \
            -DENABLE_WALLET=ON \
            -DWITH_BDB=ON \
            -DENABLE_TESTS=ON \
            -DENABLE_BENCH=OFF \
            -DBOOST_ROOT="$DEPENDS_PREFIX" \
            -DBOOST_INCLUDEDIR="$DEPENDS_PREFIX/include" \
            -DBOOST_LIBRARYDIR="$DEPENDS_PREFIX/lib" \
            -DZEROMQ_ROOT="$DEPENDS_PREFIX" \
            -DZEROMQ_INCLUDE_DIR="$DEPENDS_PREFIX/include" \
            -DZEROMQ_LIBRARY="$DEPENDS_PREFIX/lib/libzmq.a" \
            -DBerkeleyDB_ROOT="$DEPENDS_PREFIX" \
            -DBerkeleyDB_INCLUDE_DIR="$DEPENDS_PREFIX/include" \
            -DBerkeleyDB_LIBRARY="$DEPENDS_PREFIX/lib/libdb_cxx-4.8.a"

          cmake --build "$BASE_BUILD_DIR" --parallel -j$(nproc) --target all

      - name: Run ${{ matrix.config.name }} test
        run: |
          source $HOME/venv/bin/activate
          cd "$BASE_ROOT_DIR"
          export PATH="$BASE_BUILD_DIR/bin:$PATH"
          # ulimit is per-process and does not carry over from the "Enable
          # core dumps" step (each `run:` block is a separate shell) -- it
          # must be set here, in the shell that actually execs the test
          # binaries and their children.
          ulimit -c unlimited
          echo "Disk space before test:"
          df -h .

          # These scripts are deliberately kept out of test_runner.py's
          # ALL_SCRIPTS (see HEAVY_SCRIPTS in test_runner.py) so they never run
          # as part of the daily base/extended suites -- but that also means
          # test_runner.py's positional-arg lookup (which only matches
          # ALL_SCRIPTS) can't run them by name either. Invoke each script
          # directly instead: every functional test is independently runnable
          # via its own `if __name__ == '__main__'` block and accepts
          # --tmpdir/--scheme/--configfile directly (test_framework.py's own
          # arg parser), so no orchestration layer is needed here.
          #
          # --configfile/--cachedir/--portseed mirror what test_runner.py
          # adds to every invocation automatically (test_runner.py's
          # main()/run_tests()/TestHandler). They matter beyond cosmetics:
          # test_framework.py's own --cachedir default resolves relative to
          # test_framework.py's own path (under $BASE_ROOT_DIR), whereas
          # test_runner.py overrides it to a BUILDDIR-relative path -- left
          # unset, direct invocation would silently use a different (and, for
          # feature_dbcrash's cache-based chain setup, unpopulated) cache
          # directory. --configfile happens to resolve to the same file
          # either way here, but is passed explicitly for parity. The two
          # feature_dbcrash invocations below intentionally share one
          # --cachedir: its cache-priming step never reads --scheme, so this
          # matches test_runner.py's own --heavy behavior, which also runs
          # both variants against a single shared cache.
          CONFIGFILE="$BASE_ROOT_DIR/test/config.ini"
          CACHEDIR="$BASE_BUILD_DIR/test/cache"
          rm -rf "$CACHEDIR"
          IFS='|' read -r -a SCRIPTS <<< "${{ join(matrix.config.scripts, '|') }}"
          index=0
          for script_line in "${SCRIPTS[@]}"; do
            script_name=$(echo "$script_line" | awk '{print $1}')
            test_dir="$TAPYRUS_TEST_DIR/$(basename "$script_name" .py)_${index}"
            echo "---------------- Start $script_line ----------------"
            if python3 test/functional/$script_line \
              --tmpdir="$test_dir" \
              --configfile="$CONFIGFILE" \
              --cachedir="$CACHEDIR" \
              --portseed="$index"; then
              echo "$script_line passed"
            else
              echo "$script_line FAILED"
              exit 1
            fi
            index=$((index + 1))
          done
          echo "Disk space after test:"
          df -h .

      # TODO: Uncomment this section once USDT tests are ready to run in CI.
      # The scripts exist in test/functional/ and are listed in USDT_SCRIPTS in test_runner.py.
      # They currently fail because the BPF scripts embedded in each test require kernel-level
      # access (CAP_BPF / root) that is not available on standard GitHub Actions runners.
      # A self-hosted runner with the right kernel capabilities is needed.
      #
      # - name: Run USDT tests
      #   run: |
      #     source $HOME/venv/bin/activate
      #     cd "$BASE_ROOT_DIR"
      #     export PATH="$BASE_BUILD_DIR/bin:$PATH"
      #     echo "---------------- Start USDT functional tests ----------------"
      #     if python3 test/functional/test_runner.py \
      #       --tmpdir="$TAPYRUS_TEST_DIR" \
      #       -j 1 \
      #       --combinedlogslen=4000 \
      #       --failfast \
      #       interface_usdt_mempool.py \
      #       interface_usdt_net.py \
      #       interface_usdt_utxocache.py; then
      #       echo "USDT tests passed"
      #     else
      #       echo "USDT tests FAILED"
      #       exit 1
      #     fi

      - name: Print full combined logs (on failure)
        # A job hitting the 6h GitHub-hosted-runner ceiling ends with
        # conclusion "cancelled", not "failure" -- exactly the case this step
        # exists for, so it must run on both.
        if: failure() || cancelled()
        run: |
          # Each script is invoked directly (not through test_runner.py), so
          # nothing prints combined per-node logs on its own -- do it here by
          # combining the full, untruncated logs (test framework + every
          # node's debug.log) for each test's --tmpdir directly.
          # $GITHUB_STEP_SUMMARY silently drops anything past its 1 MB
          # per-step cap, so the full output goes to a file uploaded as an
          # artifact, with only a tail in the summary.
          shopt -s nullglob
          TESTDIRS=("$TAPYRUS_TEST_DIR"/*/)
          if [ ${#TESTDIRS[@]} -eq 0 ]; then
            echo "No test directories found under $TAPYRUS_TEST_DIR"
            exit 0
          fi
          LOGDIR="${{ github.workspace }}/combined_logs"
          mkdir -p "$LOGDIR"
          echo "## Full Combined Logs — ${{ matrix.config.name }}" >> "$GITHUB_STEP_SUMMARY"
          for testdir in "${TESTDIRS[@]}"; do
            testdir="${testdir%/}"
            echo "Combining logs for $testdir"
            LOGFILE="$LOGDIR/$(basename "$testdir").log"
            python3 "$BASE_ROOT_DIR/test/functional/combine_logs.py" "$testdir" > "$LOGFILE" 2>&1
            {
              echo ""
              echo "### $(basename "$testdir") (tail; full log in the heavy-combined-logs artifact)"
              echo '```'
              tail -c 950000 "$LOGFILE"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Upload combined logs (on failure)
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: heavy-combined-logs-${{ matrix.config.name }}-${{ github.run_id }}
          path: ${{ github.workspace }}/combined_logs/
          retention-days: 7
          if-no-files-found: ignore

      - name: Save Ccache cache
        if: github.ref == 'refs/heads/master'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: ${{ env.CCACHE_DIR }}
          key: daily-linux-x86_64-RelWithDebInfo-true-true-true-ccache-${{ github.run_id }}-${{ matrix.config.name }}

      - name: Stop dangling test processes
        if: always()
        run: |
          # CI_FAILFAST_TEST_LEAVE_DANGLING=1 intentionally skips node.stop()
          # on a failed/timed-out test so datadirs/logs survive for
          # inspection, but a still-running tapyrusd keeps rotating its
          # wallet's BDB log files -- racing the artifact zip below and
          # producing sporadic ENOENT errors during zip creation. The
          # process itself isn't needed (there's no live-attach step after
          # the job ends), only the on-disk data is, so kill it here to
          # make the directory quiescent before archiving.
          pkill -9 -f tapyrusd || true
          sleep 2

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heavy-test-results-${{ matrix.config.name }}-${{ github.run_id }}
          path: ${{ github.workspace }}/tapyrus_test
          retention-days: 7
          if-no-files-found: ignore

      - name: Debug core dump (on failure)
        if: failure() || cancelled()
        run: |
          # Scan the directory configured via core_pattern in "Enable core
          # dumps and set test dir" directly -- coredumpctl (systemd-coredump's
          # own index) never sees these dumps, since core_pattern was pointed
          # at a plain file path instead of the systemd-coredump pipe.
          CORE_DUMP_DIR="${{ github.workspace }}/core_dumps"
          shopt -s nullglob
          COREFILES=("$CORE_DUMP_DIR"/core.*)
          if [ ${#COREFILES[@]} -eq 0 ]; then
            echo "No core dumps found in $CORE_DUMP_DIR"
            exit 0
          fi

          {
            echo "## Core Dump Backtraces — ${{ matrix.config.name }}"
          } >> "$GITHUB_STEP_SUMMARY"

          for COREFILE in "${COREFILES[@]}"; do
            echo "Found core dump: $COREFILE"

            # `file` embeds the crashing binary's path, but it may be relative
            # to wherever it was invoked from (e.g. "./tapyrusd" run from
            # $BASE_BUILD_DIR/bin) rather than this step's cwd ($GITHUB_WORKSPACE).
            BINARY_RAW=$(file "$COREFILE" | awk -F"'" '{print $2}')
            if [ -x "$BINARY_RAW" ]; then
              BINARY="$BINARY_RAW"
            elif [ -x "$BASE_BUILD_DIR/bin/$(basename "$BINARY_RAW" 2>/dev/null)" ]; then
              BINARY="$BASE_BUILD_DIR/bin/$(basename "$BINARY_RAW")"
            else
              echo "Could not detect crashed binary, using tapyrusd as default"
              BINARY="$BASE_BUILD_DIR/bin/tapyrusd"
            fi
            echo "Using binary: $BINARY"

            {
              echo ""
              echo "### $(basename "$COREFILE") ($BINARY)"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            gdb -batch -ex "bt full" -ex "quit" "$BINARY" "$COREFILE" 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"

            echo '```' >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Upload core dumps (on failure)
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: heavy-core-dumps-${{ matrix.config.name }}-${{ github.run_id }}
          path: ${{ github.workspace }}/core_dumps/
          retention-days: 7

  docker-testnet-sync:
    name: Docker testnet sync (single node)
    runs-on: ubuntu-latest
    # A fresh node synced against master in ~30 minutes, so the first check
    # waits 30 minutes, then polls every 10 minutes until sync completes, up
    # to a 2 hour max budget - a generous 4x margin over the known baseline.
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.test_branch || github.ref || 'master' }}
          submodules: recursive

      - name: Build tapyrusd Docker image
        run: docker build -t tapyrusd:weekly-testnet-sync .

      - name: Start node connected to the public testnet
        # Config/genesis block per doc/tapyrus/getting_started.md
        # ("How to start a node on Tapyrus testnet?") and doc/docker_image.md.
        # Testnet is network ID 1939510133, tapyrus "prod" mode (see
        # doc/tapyrus/network_id_and_magic_bytes.md) - not a separate build mode.
        # The genesis hex itself lives in contrib/docker/testnet-genesis-block-with-sig
        # (single source of truth - must match the testnet example in
        # doc/tapyrus/getting_started.md if that's ever regenerated).
        run: |
          cat << 'EOS' > tapyrus.conf
          networkid=1939510133
          txindex=1
          server=1
          rest=1
          rpcuser=rpcuser
          rpcpassword=rpcpassword
          rpcbind=0.0.0.0
          rpcallowip=127.0.0.1
          addseeder=static-seed.tapyrus.dev.chaintope.com
          EOS

          docker run -d --name tapyrus_testnet_sync \
            -v "$PWD/tapyrus.conf:/etc/tapyrus/tapyrus.conf" \
            -e GENESIS_BLOCK_WITH_SIG="$(cat contrib/docker/testnet-genesis-block-with-sig)" \
            tapyrusd:weekly-testnet-sync

          sleep 30
          if ! docker ps --format '{{.Names}}' | grep -q '^tapyrus_testnet_sync$'; then
            docker logs tapyrus_testnet_sync
            echo "FAILED: container exited within 30 seconds of startup"
            exit 1
          fi

      - name: Wait for testnet sync to complete
        run: |
          cli() { docker exec tapyrus_testnet_sync tapyrus-cli -conf=/etc/tapyrus/tapyrus.conf "$@"; }
          # jq (preinstalled on ubuntu-latest) avoids coupling this health check to
          # tapyrus-cli's pretty-printed JSON spacing (`"initialblockdownload": false`),
          # which is a format assumption rather than a guaranteed API contract.
          ibd_complete() { [ "$(cli getblockchaininfo | jq -r .initialblockdownload)" = "false" ]; }

          echo "Waiting 30 minutes for peer discovery and initial sync..."
          sleep 1800
          # RPC calls return an empty string (not an error) if the container/tapyrusd
          # isn't reachable yet; without the fallback, `[ "" -lt 1 ]` aborts the step
          # with a bash "integer expression expected" error instead of FAILED: ...
          connections=$(cli getconnectioncount 2>/dev/null || echo 0)
          height_prev=$(cli getblockcount 2>/dev/null || echo 0)
          echo "After 30 min: height=$height_prev connections=$connections"

          if [ "$connections" -lt 1 ]; then
            echo "FAILED: node made no peer connections to the testnet"
            exit 1
          fi

          if ibd_complete; then
            echo "Node completed initial block download within 30 minutes."
            exit 0
          fi

          # Poll every 10 minutes until sync completes, up to a 2 hour total
          # budget (30 min + 9 * 10 min).
          for checkpoint in $(seq 1 9); do
            elapsed=$((30 + (checkpoint - 1) * 10))
            echo "Checkpoint $checkpoint/9 (elapsed ${elapsed}m): waiting 10 minutes..."
            sleep 600
            height_now=$(cli getblockcount 2>/dev/null || echo 0)
            connections=$(cli getconnectioncount 2>/dev/null || echo 0)
            echo "Checkpoint $checkpoint: height=$height_now connections=$connections"

            if [ "$connections" -lt 1 ]; then
              echo "FAILED: lost all peer connections at checkpoint $checkpoint"
              exit 1
            fi

            if ibd_complete; then
              echo "Node completed initial block download."
              exit 0
            fi

            if [ "$height_now" -le "$height_prev" ]; then
              echo "FAILED: no sync progress since last checkpoint ($height_prev -> $height_now)"
              exit 1
            fi

            height_prev=$height_now
          done

          echo "FAILED: sync did not complete within the 2 hour max time"
          exit 1

      - name: Dump node debug.log
        if: always()
        run: docker exec tapyrus_testnet_sync cat /var/lib/tapyrus/debug.log || true

      - name: Stop and remove container
        if: always()
        run: docker rm -f tapyrus_testnet_sync || true
